    # --- Section flash.sh ---
    - type: heading
      level: 3
      text: "flash.sh — Flashage sur cle USB"
      translatable: true

    - type: paragraph
      inline:
        - text: "Ecrit l'ISO sur une cle USB. "
          translatable: true
        - type: bold
