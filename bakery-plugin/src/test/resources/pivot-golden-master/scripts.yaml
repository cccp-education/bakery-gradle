              - text: "1/5 — Fichier"
                translatable: true
          - inline:
              - text: "L'ISO existe et est lisible"
                translatable: true
        - - inline:
              - text: "2/5 — Taille"
                translatable: true
          - inline:
              - text: "L'ISO fait plus de 500 Mo"
                translatable: true
        - - inline:
              - text: "3/5 — Boot files"
                translatable: true
          - inline:
              - text: "vmlinuz et initrd presents dans l'ISO"
                translatable: true
        - - inline:
              - text: "4/5 — Bootloader"
                translatable: true
          - inline:
              - text: "GRUB ou syslinux detecte"
                translatable: true
