# Article YAML Pivot — scripts.adoc
# 3e fichier — stress test du schéma.
# Apporte : hr (---), heading niveau 4 (====), cellules table avec inline code.
# Correction schéma : cellules table passent de text simple à inline[] (mix texte+code).

