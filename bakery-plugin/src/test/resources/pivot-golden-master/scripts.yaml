          translatable: true

    - type: source
      language: bash
      translatable: false
      content: |
        sudo scripts/flash.sh /dev/sdX

    - type: heading
      level: 4
      text: "Fonctionnement"
      translatable: true

    - type: list
      ordered: true
      items:
        - inline:
            - text: "Verifie que le device est un peripherique bloc"
              translatable: true
        - inline:
            - text: "Verifie que le script est execute en root"
              translatable: true
        - inline:
            - text: "Trouve l'ISO la plus recente dans "
              translatable: true
            - type: code
              text: "build/"
              translatable: false
        - inline:
            - text: "Demande une confirmation ("
              translatable: true
            - type: code
              text: "YES"
              translatable: false
            - text: ") avant d'effacer"
              translatable: true
        - inline:
            - text: "Demonte les partitions montees sur le device"
              translatable: true
        - inline:
            - text: "Ecrit l'ISO avec "
              translatable: true
            - type: code
              text: "dd"
              translatable: false
            - text: " (bs=4M, conv=fsync)"
              translatable: false
        - inline:
            - text: "Synchronise avec "
              translatable: true
            - type: code
              text: "sync"
              translatable: false

    - type: admonition
