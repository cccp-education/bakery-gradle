          inline:
            - text: "Cette commande est "
              translatable: true
            - type: bold
              text: "destructrice"
              translatable: true
            - text: ". Verifiez le device avec "
              translatable: true
            - type: code
              text: "lsblk"
              translatable: false
            - text: " avant de lancer le script. Une erreur de device peut effacer votre disque systeme."
              translatable: true

    - type: hr
      translatable: false

