              translatable: true
        - inline:
            - text: "Demande confirmation ("
              translatable: true
            - type: code
              text: "YES"
              translatable: false
            - text: ")"
              translatable: true
        - inline:
            - text: "Demonte la partition cible"
              translatable: true
        - inline:
            - text: "Ecrit l'ISO sur la partition cible avec "
              translatable: true
            - type: code
              text: "dd"
              translatable: false
        - inline:
            - text: "Met a jour le bootloader (note : cette etape est manuelle pour l'instant)"
