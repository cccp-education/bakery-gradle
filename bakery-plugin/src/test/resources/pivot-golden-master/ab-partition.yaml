      text: "Avantages du systeme A/B"
      translatable: true

    - type: list
      ordered: false
      items:
        - inline:
            - type: bold
              text: "Mise a jour zero-downtime"
              translatable: true
            - text: " : pas de periode ou la cle est inutilisable"
              translatable: true
        - inline:
            - type: bold
              text: "Rollback automatique"
              translatable: true
            - text: " : si le nouveau systeme ne boot pas, on revient a l'ancien"
              translatable: true
        - inline:
            - type: bold
              text: "Donnees sauvees"
              translatable: true
            - text: " : la partition Persistence n'est jamais reformatee"
              translatable: true
        - inline:
            - type: bold
              text: "Reproductibilite"
              translatable: true
            - text: " : meme ISO = meme resultat sur N cles"
              translatable: true

    - type: heading
      level: 3
      text: "Commandes utiles"
      translatable: true

    - type: source
      language: bash
      translatable: false
      content: |
        # Voir les partitions d'une cle
        lsblk /dev/sdX

        # Detecter la partition active
        mount | grep -E "sdX[12]"

        # Mettre a jour le systeme (A vers B ou B vers A)
        sudo scripts/update-system.sh /dev/sdX

        # Mettre a jour avec un ISO specifique
        sudo scripts/update-system.sh /dev/sdX chemin/vers/magic-stick_0.1.8.iso

