name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and Test (UT + Cucumber)
        run: ./gradlew build
        working-directory: bakery-plugin

      - name: Install Playwright Chromium
        run: ./gradlew installPlaywright
        working-directory: bakery-plugin

      - name: Run E2E Tests
        run: ./gradlew e2eTest
        working-directory: bakery-plugin